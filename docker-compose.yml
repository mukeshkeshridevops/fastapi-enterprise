version: "3.9"

services:

  api:
    build: .
    container_name: fastapi-api

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/employee_db

    depends_on:
      - postgres
      - redis

  postgres:

    image: postgres:16

    container_name: postgres-db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: employee_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7

    container_name: redis-cache

    ports:
      - "6379:6379"

volumes:

  postgres_data: